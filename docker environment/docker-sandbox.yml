version: "3.9"

x-common-config: &common-config
    user: "${MYUID}:${MYGID}"
    build:
      context: .
      dockerfile: Dockerfile_sandbox
    working_dir: /app
    environment:
        - TEST_PARAM=${TEST_PARAM:-default}
        - COVERAGE_ID=${COVERAGE_ID:-default}
    command: >
        bash -c "
            mkdir -p /app/output && 
            mkdir -p /app/coverage_data &&
            coverage run --data-file=/app/coverage_data/.coverage.${COVERAGE_ID} -m utils.execute_all_cases &&
            coverage html --data-file=/app/coverage_data/.coverage.${COVERAGE_ID} -d /app/coverage_data/html_${COVERAGE_ID} &&
            coverage report --data-file=/app/coverage_data/.coverage.${COVERAGE_ID} > /app/coverage_data/report_${COVERAGE_ID}.txt
        "
        
services:  
    dev1:
        <<: *common-config
        container_name: sandbox_dev1
        image: sandbox_dev1
        user: "0:0"
        networks:
            - ssh_net
        volumes:
            - ${VP_DIR:-./VP-Dataset_og}/dev1.py:/app/functions/dev1.py:ro
            - ./config/dev1_config.toml:/app/config/dev1_config.toml
            - ./utils:/app/utils:ro
            - ${OUTPUT_DIR:-./output_og}:/app/output
            - ${COVERAGE_DIR:-./coverage_og}:/app/coverage_data
            
    
    dev2:
        <<: *common-config
        container_name: sandbox_dev2
